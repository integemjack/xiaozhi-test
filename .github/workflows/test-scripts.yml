name: Test Xiaozhi Scripts

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  ZIP_URL: "https://creator.integem.com/wp-content/soft/xiaozhi_v18.zip"

jobs:
  test-linux:
    name: Test on Linux
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and extract project
        run: |
          curl -L --retry 5 --retry-delay 10 --retry-all-errors -o xiaozhi_v18.zip "$ZIP_URL"
          unzip -o xiaozhi_v18.zip -d xiaozhi_extracted
          find xiaozhi_extracted -maxdepth 1 -type f | sort

      - name: Create CI Docker Compose
        run: |
          cat > docker-compose-ci.yml << 'EOF'
          services:
            xiaozhi-esp32-server-db:
              image: mysql:9.0
              container_name: xiaozhi-esp32-server-db
              healthcheck:
                test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
                timeout: 45s
                interval: 10s
                retries: 10
              restart: always
              ports:
                - "3306:3306"
              environment:
                - MYSQL_ROOT_PASSWORD=123456
                - MYSQL_DATABASE=xiaozhi_esp32_server
            xiaozhi-esp32-server-redis:
              image: redis:8.0
              container_name: xiaozhi-esp32-server-redis
              ports:
                - "6379:6379"
              healthcheck:
                test: ["CMD", "redis-cli", "ping"]
                interval: 10s
                timeout: 5s
                retries: 3
          EOF

      - name: Start infrastructure services
        run: |
          docker compose -f docker-compose-ci.yml up -d --wait --wait-timeout 120
          docker ps --format "table {{.Names}}\t{{.Status}}"

      - name: Verify services
        run: |
          echo "=== Verify MySQL ==="
          docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 -e "SELECT 1;" 2>/dev/null && echo "  [PASS] MySQL OK"
          echo "=== Verify Redis ==="
          docker exec xiaozhi-esp32-server-redis redis-cli PING | grep -q PONG && echo "  [PASS] Redis OK"

      - name: Initialize DB tables
        run: |
          docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -e "
            CREATE TABLE IF NOT EXISTS sys_params (
              id INT AUTO_INCREMENT PRIMARY KEY,
              param_code VARCHAR(100),
              param_value TEXT
            );
            CREATE TABLE IF NOT EXISTS ai_model_config (
              id INT AUTO_INCREMENT PRIMARY KEY,
              config_json TEXT
            );
            CREATE TABLE IF NOT EXISTS ai_device (
              id INT AUTO_INCREMENT PRIMARY KEY,
              mac_address VARCHAR(50),
              alias VARCHAR(100),
              last_connected_at DATETIME,
              board VARCHAR(50)
            );
            INSERT INTO sys_params (param_code, param_value) VALUES
              ('websocket_url', 'ws://192.168.20.42:8000'),
              ('ota_url', 'http://192.168.20.42:8002/xiaozhi/ota/');
            INSERT INTO ai_model_config (config_json) VALUES
              ('{\"base_url\": \"http://192.168.20.42:11434\"}');
          " 2>/dev/null
          echo "  [PASS] DB tables initialized"

      - name: Test changeIp.command
        working-directory: xiaozhi_extracted
        run: |
          echo "=== changeIp.command ==="
          # 1. Syntax check
          bash -n changeIp.command && echo "  [PASS] Bash syntax OK"
          # 2. IP detection
          LAN_IP=$(hostname -I | awk '{print $1}')
          echo "  [INFO] LAN IP: $LAN_IP"
          # 3. Simulate changeIp logic
          echo "192.168.20.42" > .last_ip
          # 4. SQL replacement (core logic of changeIp)
          docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -e \
            "UPDATE sys_params SET param_value = REPLACE(param_value, '192.168.20.42', '$LAN_IP') WHERE param_value LIKE '%192.168.20.42%';" 2>/dev/null
          docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -e \
            "UPDATE ai_model_config SET config_json = REPLACE(config_json, '192.168.20.42', '$LAN_IP') WHERE config_json LIKE '%192.168.20.42%';" 2>/dev/null
          echo "  [PASS] SQL replacement executed"
          # 5. Verify replacement
          RESULT=$(docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -N -e \
            "SELECT param_value FROM sys_params WHERE param_value LIKE '%$LAN_IP%';" 2>/dev/null)
          if echo "$RESULT" | grep -q "$LAN_IP"; then
            echo "  [PASS] IP replaced in sys_params: $RESULT"
          else
            echo "  [FAIL] IP not found after replacement"
            exit 1
          fi
          # 6. Redis flush
          docker exec xiaozhi-esp32-server-redis redis-cli FLUSHALL | grep -q OK && echo "  [PASS] Redis FLUSHALL OK"
          echo "  [PASS] changeIp.command fully validated"

      - name: Test changeIp.bat structure
        working-directory: xiaozhi_extracted
        run: |
          echo "=== changeIp.bat ==="
          test -s changeIp.bat && echo "  [PASS] File exists and non-empty"
          grep -q "docker exec" changeIp.bat && echo "  [PASS] Has docker exec"
          grep -q "FLUSHALL" changeIp.bat && echo "  [PASS] Has Redis FLUSHALL"
          grep -q "sys_params" changeIp.bat && echo "  [PASS] Has sys_params update"
          grep -q "ai_model_config" changeIp.bat && echo "  [PASS] Has ai_model_config update"
          grep -q "docker compose" changeIp.bat && echo "  [PASS] Has docker compose restart"
          echo "  [PASS] changeIp.bat validated"

      - name: Test XiaozhiDiagnostic functions (headless)
        working-directory: xiaozhi_extracted
        run: |
          python3 << 'EOF'
          import subprocess, re, socket, sys

          passes, errors = [], []

          def run_cmd(cmd):
              try:
                  r = subprocess.run(cmd, shell=True, capture_output=True, timeout=30, encoding="utf-8", errors="replace")
                  return r.returncode, (r.stdout or "") + (r.stderr or "")
              except: return -1, ""

          def port_ok(port):
              try:
                  s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  s.settimeout(2)
                  ok = s.connect_ex(("127.0.0.1", port)) == 0
                  s.close()
                  return ok
              except: return False

          def check(name, ok):
              (passes if ok else errors).append(name)
              print(f"  {'[PASS]' if ok else '[FAIL]'} {name}")

          # 1. Docker check
          rc, _ = run_cmd("docker info")
          check("Docker running", rc == 0)

          # 2. Container check
          rc, out = run_cmd("docker ps --format '{{.Names}}'")
          running = [x.strip().strip("'") for x in out.split("\n") if x.strip()]
          check("Container: xiaozhi-esp32-server-db", "xiaozhi-esp32-server-db" in running)
          check("Container: xiaozhi-esp32-server-redis", "xiaozhi-esp32-server-redis" in running)

          # 3. LAN IP detection
          rc, out = run_cmd("hostname -I")
          ips = [ip for ip in out.split() if not ip.startswith("127.")]
          check("LAN IP detection", len(ips) > 0)
          if ips: print(f"       IPs: {ips}")

          # 4. Redis PING
          rc, out = run_cmd("docker exec xiaozhi-esp32-server-redis redis-cli PING")
          check("Redis PING", "PONG" in out)

          # 5. DB connection
          rc, out = run_cmd('docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -N -e "SELECT 1;"')
          check("DB connection", "1" in out)

          # 6. DB query (sys_params)
          rc, out = run_cmd('docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -N -e "SELECT COUNT(*) FROM sys_params;"')
          check("DB sys_params query", rc == 0 and out.strip().isdigit())

          # 7. DB query (ai_model_config)
          rc, out = run_cmd('docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -N -e "SELECT COUNT(*) FROM ai_model_config;"')
          check("DB ai_model_config query", rc == 0 and out.strip().isdigit())

          # 8. DB query (ai_device table)
          rc, out = run_cmd('docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -N -e "SHOW TABLES LIKE \'ai_device\';"')
          check("DB ai_device table", "ai_device" in out)

          print(f"\n=== {len(passes)} passed, {len(errors)} failed ===")
          if errors:
              for e in errors: print(f"  - {e}")
              sys.exit(1)
          EOF

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose-ci.yml down -v 2>/dev/null || true

  test-macos:
    name: Test on macOS
    runs-on: macos-13
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and extract project
        run: |
          curl -L --retry 5 --retry-delay 10 --retry-all-errors -o xiaozhi_v18.zip "$ZIP_URL"
          unzip -o xiaozhi_v18.zip -d xiaozhi_extracted
          find xiaozhi_extracted -maxdepth 1 -type f | sort

      - name: Install and start Docker (colima)
        run: |
          brew install docker docker-compose colima
          colima start --cpu 2 --memory 4 --disk 20 --vm-type=qemu
          for i in $(seq 1 30); do
            docker info >/dev/null 2>&1 && break
            sleep 2
          done
          docker --version

      - name: Create CI Docker Compose and start services
        run: |
          cat > docker-compose-ci.yml << 'EOF'
          services:
            xiaozhi-esp32-server-db:
              image: mysql:9.0
              container_name: xiaozhi-esp32-server-db
              healthcheck:
                test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
                timeout: 45s
                interval: 10s
                retries: 10
              ports:
                - "3306:3306"
              environment:
                - MYSQL_ROOT_PASSWORD=123456
                - MYSQL_DATABASE=xiaozhi_esp32_server
            xiaozhi-esp32-server-redis:
              image: redis:8.0
              container_name: xiaozhi-esp32-server-redis
              ports:
                - "6379:6379"
              healthcheck:
                test: ["CMD", "redis-cli", "ping"]
                interval: 10s
                timeout: 5s
                retries: 3
          EOF
          docker compose -f docker-compose-ci.yml up -d
          echo "Waiting for MySQL healthy..."
          for i in $(seq 1 30); do
            if docker inspect --format='{{.State.Health.Status}}' xiaozhi-esp32-server-db 2>/dev/null | grep -q "healthy"; then
              echo "  MySQL ready after $((i*5))s"
              break
            fi
            sleep 5
          done

      - name: Initialize DB
        run: |
          docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -e "
            CREATE TABLE IF NOT EXISTS sys_params (id INT AUTO_INCREMENT PRIMARY KEY, param_code VARCHAR(100), param_value TEXT);
            CREATE TABLE IF NOT EXISTS ai_model_config (id INT AUTO_INCREMENT PRIMARY KEY, config_json TEXT);
            CREATE TABLE IF NOT EXISTS ai_device (id INT AUTO_INCREMENT PRIMARY KEY, mac_address VARCHAR(50), alias VARCHAR(100), last_connected_at DATETIME, board VARCHAR(50));
            INSERT INTO sys_params (param_code, param_value) VALUES ('websocket_url', 'ws://192.168.20.42:8000'), ('ota_url', 'http://192.168.20.42:8002/xiaozhi/ota/');
            INSERT INTO ai_model_config (config_json) VALUES ('{\"base_url\": \"http://192.168.20.42:11434\"}');
          " 2>/dev/null && echo "  [PASS] DB initialized"

      - name: Test changeIp.command (macOS native)
        working-directory: xiaozhi_extracted
        run: |
          echo "=== changeIp.command ==="
          bash -n changeIp.command && echo "  [PASS] Syntax OK"
          head -1 changeIp.command | grep -q "^#!/bin/bash" && echo "  [PASS] Shebang OK"
          CR=$(tr -cd '\r' < changeIp.command | wc -c | tr -d ' ')
          [ "$CR" -eq "0" ] && echo "  [PASS] No CRLF (macOS compatible)" || { echo "  [FAIL] CRLF found"; exit 1; }
          # Test IP detection
          LAN_IP=$(ifconfig | grep "inet " | grep -v "127.0.0.1" | awk '{print $2}' | head -1)
          echo "  [INFO] LAN IP: $LAN_IP"
          echo "192.168.20.42" > .last_ip
          # Test SQL logic
          docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -e \
            "UPDATE sys_params SET param_value = REPLACE(param_value, '192.168.20.42', '$LAN_IP') WHERE param_value LIKE '%192.168.20.42%';" 2>/dev/null
          docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -e \
            "UPDATE ai_model_config SET config_json = REPLACE(config_json, '192.168.20.42', '$LAN_IP') WHERE config_json LIKE '%192.168.20.42%';" 2>/dev/null
          RESULT=$(docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -N -e \
            "SELECT param_value FROM sys_params WHERE param_value LIKE '%$LAN_IP%';" 2>/dev/null)
          echo "$RESULT" | grep -q "$LAN_IP" && echo "  [PASS] IP replaced OK" || { echo "  [FAIL] IP not replaced"; exit 1; }
          docker exec xiaozhi-esp32-server-redis redis-cli FLUSHALL | grep -q OK && echo "  [PASS] Redis FLUSHALL OK"
          echo "  [PASS] changeIp.command fully validated on macOS"

      - name: Test startDiagnostic.command
        working-directory: xiaozhi_extracted
        run: |
          bash -n startDiagnostic.command && echo "  [PASS] Syntax OK"
          head -1 startDiagnostic.command | grep -q "^#!" && echo "  [PASS] Has shebang"

      - name: Test XiaozhiDiagnostic-macOS binary
        working-directory: xiaozhi_extracted
        run: |
          test -f XiaozhiDiagnostic-macOS && echo "  [PASS] Binary exists"
          chmod +x XiaozhiDiagnostic-macOS
          file XiaozhiDiagnostic-macOS
          file XiaozhiDiagnostic-macOS | grep -q "Mach-O" && echo "  [PASS] Valid Mach-O" || echo "  [INFO] Not Mach-O format"

      - name: Test XiaozhiDiagnostic functions (headless)
        run: |
          python3 << 'EOF'
          import subprocess, re, socket, sys
          passes, errors = [], []
          def run_cmd(cmd):
              try:
                  r = subprocess.run(cmd, shell=True, capture_output=True, timeout=30, encoding="utf-8", errors="replace")
                  return r.returncode, (r.stdout or "") + (r.stderr or "")
              except: return -1, ""
          def check(name, ok):
              (passes if ok else errors).append(name)
              print(f"  {'[PASS]' if ok else '[FAIL]'} {name}")

          rc, _ = run_cmd("docker info")
          check("Docker running", rc == 0)
          rc, out = run_cmd("docker ps --format '{{.Names}}'")
          running = [x.strip().strip("'") for x in out.split("\n") if x.strip()]
          check("DB container", "xiaozhi-esp32-server-db" in running)
          check("Redis container", "xiaozhi-esp32-server-redis" in running)
          rc, out = run_cmd("ifconfig 2>/dev/null")
          ips = [m.group(1) for m in re.finditer(r"inet (\d+\.\d+\.\d+\.\d+)", out) if not m.group(1).startswith("127.")]
          check("LAN IP detection", len(ips) > 0)
          rc, out = run_cmd("docker exec xiaozhi-esp32-server-redis redis-cli PING")
          check("Redis PING", "PONG" in out)
          rc, out = run_cmd('docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -N -e "SELECT 1;"')
          check("DB connection", "1" in out)
          rc, out = run_cmd('docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -N -e "SELECT COUNT(*) FROM sys_params;"')
          check("DB sys_params query", rc == 0 and out.strip().isdigit())

          print(f"\n=== {len(passes)} passed, {len(errors)} failed ===")
          if errors:
              for e in errors: print(f"  - {e}")
              sys.exit(1)
          EOF

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose-ci.yml down -v 2>/dev/null || true
          colima stop 2>/dev/null || true

  test-windows:
    name: Test on Windows
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and extract project
        shell: bash
        run: |
          curl -L --retry 5 --retry-delay 10 --retry-all-errors -o xiaozhi_v18.zip "$ZIP_URL"
          unzip -o xiaozhi_v18.zip -d xiaozhi_extracted

      - name: Create CI Docker Compose and start services
        run: |
          @"
          services:
            xiaozhi-esp32-server-db:
              image: mysql:9.0
              container_name: xiaozhi-esp32-server-db
              healthcheck:
                test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
                timeout: 45s
                interval: 10s
                retries: 10
              ports:
                - "3306:3306"
              environment:
                - MYSQL_ROOT_PASSWORD=123456
                - MYSQL_DATABASE=xiaozhi_esp32_server
            xiaozhi-esp32-server-redis:
              image: redis:8.0
              container_name: xiaozhi-esp32-server-redis
              ports:
                - "6379:6379"
              healthcheck:
                test: ["CMD", "redis-cli", "ping"]
                interval: 10s
                timeout: 5s
                retries: 3
          "@ | Out-File -Encoding utf8 docker-compose-ci.yml
          docker compose -f docker-compose-ci.yml up -d
          Write-Host "Waiting for MySQL healthy..."
          for ($i=1; $i -le 30; $i++) {
              $h = docker inspect --format='{{.State.Health.Status}}' xiaozhi-esp32-server-db 2>$null
              if ($h -eq "healthy") { Write-Host "  MySQL ready after $($i*5)s"; break }
              Start-Sleep -Seconds 5
          }
          docker ps --format "table {{.Names}}\t{{.Status}}"

      - name: Initialize DB
        run: |
          docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -e "CREATE TABLE IF NOT EXISTS sys_params (id INT AUTO_INCREMENT PRIMARY KEY, param_code VARCHAR(100), param_value TEXT); CREATE TABLE IF NOT EXISTS ai_model_config (id INT AUTO_INCREMENT PRIMARY KEY, config_json TEXT); CREATE TABLE IF NOT EXISTS ai_device (id INT AUTO_INCREMENT PRIMARY KEY, mac_address VARCHAR(50), alias VARCHAR(100), last_connected_at DATETIME, board VARCHAR(50)); INSERT INTO sys_params (param_code, param_value) VALUES ('websocket_url', 'ws://192.168.20.42:8000'), ('ota_url', 'http://192.168.20.42:8002/xiaozhi/ota/'); INSERT INTO ai_model_config (config_json) VALUES ('{""base_url"": ""http://192.168.20.42:11434""}');" 2>$null
          Write-Host "  [PASS] DB initialized"

      - name: Test changeIp.bat
        working-directory: xiaozhi_extracted
        run: |
          Write-Host "=== changeIp.bat ==="
          $content = Get-Content changeIp.bat -Raw
          if ($content -match '@echo off') { Write-Host "  [PASS] Has @echo off" }
          if ($content -match 'docker exec') { Write-Host "  [PASS] Has docker exec" }
          if ($content -match 'FLUSHALL') { Write-Host "  [PASS] Has Redis FLUSHALL" }
          if ($content -match 'sys_params') { Write-Host "  [PASS] Has sys_params SQL" }
          if ($content -match 'ai_model_config') { Write-Host "  [PASS] Has ai_model_config SQL" }
          # Test actual DB/Redis operations (same as changeIp.bat does)
          "192.168.20.42" | Out-File -Encoding ascii .last_ip
          $LAN_IP = (Get-NetIPAddress -AddressFamily IPv4 | Where-Object { $_.IPAddress -notmatch '^127\.' -and $_.IPAddress -notmatch '^169\.' } | Select-Object -First 1).IPAddress
          Write-Host "  [INFO] LAN IP: $LAN_IP"
          docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -e "UPDATE sys_params SET param_value = REPLACE(param_value, '192.168.20.42', '$LAN_IP') WHERE param_value LIKE '%192.168.20.42%';" 2>$null
          docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -e "UPDATE ai_model_config SET config_json = REPLACE(config_json, '192.168.20.42', '$LAN_IP') WHERE config_json LIKE '%192.168.20.42%';" 2>$null
          $result = docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -N -e "SELECT param_value FROM sys_params WHERE param_value LIKE '%$LAN_IP%';" 2>$null
          if ($result -match $LAN_IP) { Write-Host "  [PASS] IP replaced in DB" } else { Write-Host "  [FAIL] IP not replaced"; exit 1 }
          docker exec xiaozhi-esp32-server-redis redis-cli FLUSHALL
          Write-Host "  [PASS] changeIp.bat validated"

      - name: Test XiaozhiDiagnostic.exe
        working-directory: xiaozhi_extracted
        run: |
          Write-Host "=== XiaozhiDiagnostic.exe ==="
          if (Test-Path "XiaozhiDiagnostic.exe") { Write-Host "  [PASS] Binary exists" }
          $bytes = [System.IO.File]::ReadAllBytes("$PWD\XiaozhiDiagnostic.exe")
          if ($bytes[0] -eq 0x4D -and $bytes[1] -eq 0x5A) { Write-Host "  [PASS] Valid PE (MZ header)" }
          else { Write-Host "  [FAIL] Invalid PE"; exit 1 }

      - name: Test XiaozhiDiagnostic functions (headless)
        run: |
          $passes = @(); $errors = @()
          function Check($name, $ok) {
              if ($ok) { $script:passes += $name; Write-Host "  [PASS] $name" }
              else { $script:errors += $name; Write-Host "  [FAIL] $name" }
          }
          # Docker
          docker info 2>$null | Out-Null
          Check "Docker running" ($LASTEXITCODE -eq 0)
          # Containers
          $running = docker ps --format '{{.Names}}' 2>$null
          Check "DB container" ($running -match "xiaozhi-esp32-server-db")
          Check "Redis container" ($running -match "xiaozhi-esp32-server-redis")
          # LAN IP
          $ip = (Get-NetIPAddress -AddressFamily IPv4 | Where-Object { $_.IPAddress -notmatch '^127\.' -and $_.IPAddress -notmatch '^169\.' } | Select-Object -First 1).IPAddress
          Check "LAN IP detection" ($null -ne $ip)
          # Redis
          $ping = docker exec xiaozhi-esp32-server-redis redis-cli PING
          Check "Redis PING" ($ping -match "PONG")
          # DB
          $db = docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -N -e "SELECT 1;" 2>$null
          Check "DB connection" ($db -match "1")
          # DB query
          $count = docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -N -e "SELECT COUNT(*) FROM sys_params;" 2>$null
          Check "DB sys_params" ($count -match "\d+")

          Write-Host ""
          Write-Host "=== $($passes.Count) passed, $($errors.Count) failed ==="
          if ($errors.Count -gt 0) { $errors | ForEach-Object { Write-Host "  - $_" }; exit 1 }

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose-ci.yml down -v 2>$null
