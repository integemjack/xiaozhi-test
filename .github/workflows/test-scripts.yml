name: Test Xiaozhi Scripts

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test-linux:
    name: Test on Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and extract xiaozhi_v18.zip
        run: |
          curl -L --retry 3 --retry-delay 5 -o xiaozhi_v18.zip "https://creator.integem.com/wp-content/soft/xiaozhi_v18.zip"
          unzip -o xiaozhi_v18.zip -d xiaozhi_extracted
          echo "=== Files extracted ==="
          find xiaozhi_extracted -maxdepth 1 -type f | sort

      - name: Install Docker and start services
        run: |
          echo "=== Docker is pre-installed on ubuntu runner ==="
          docker --version
          docker compose version

      - name: Start Docker Compose services
        working-directory: xiaozhi_extracted
        run: |
          echo "=== Starting Docker Compose services ==="
          docker compose -f docker-compose_all.yml up -d
          echo "Waiting 30s for services to be ready..."
          sleep 30
          echo "=== Container status ==="
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Verify all containers are running
        run: |
          echo "=== Verifying containers ==="
          EXPECTED="xiaozhi-esp32-server xiaozhi-esp32-server-web xiaozhi-esp32-server-db xiaozhi-esp32-server-redis"
          ALL_OK=true
          for c in $EXPECTED; do
            STATUS=$(docker inspect --format='{{.State.Status}}' "$c" 2>/dev/null || echo "not_found")
            if [ "$STATUS" = "running" ]; then
              echo "  [PASS] $c is running"
            else
              echo "  [FAIL] $c status: $STATUS"
              ALL_OK=false
            fi
          done
          if [ "$ALL_OK" = "false" ]; then
            echo ""
            echo "=== Docker logs for failed containers ==="
            docker compose -f xiaozhi_extracted/docker-compose_all.yml logs --tail=50
            exit 1
          fi

      - name: Verify ports are listening
        run: |
          echo "=== Checking ports ==="
          for port in 8000 8002 8003; do
            if ss -tlnp | grep -q ":$port "; then
              echo "  [PASS] Port $port is listening"
            else
              echo "  [FAIL] Port $port is NOT listening"
              exit 1
            fi
          done

      - name: Test changeIp.command syntax and logic
        working-directory: xiaozhi_extracted
        run: |
          echo "=== Testing changeIp.command ==="
          # Syntax check
          bash -n changeIp.command && echo "  [PASS] Syntax OK" || exit 1
          # Verify it can detect IPs (non-interactive part)
          echo "  Testing IP detection logic..."
          LAN_IP=$(hostname -I | awk '{print $1}')
          echo "  Detected LAN IP: $LAN_IP"
          # Simulate: write .last_ip and run the SQL replacement non-interactively
          echo "192.168.20.42" > .last_ip
          # Test the SQL logic directly against the running DB
          echo "  Testing DB IP replacement..."
          docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -e \
            "SELECT COUNT(*) as total FROM sys_params;" 2>/dev/null && echo "  [PASS] DB connection OK" || echo "  [WARN] DB query failed (may need more time)"
          # Test the actual IP replacement SQL
          docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -e \
            "UPDATE sys_params SET param_value = REPLACE(param_value, '192.168.20.42', '$LAN_IP') WHERE param_value LIKE '%192.168.20.42%';" 2>/dev/null
          docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -e \
            "UPDATE ai_model_config SET config_json = REPLACE(config_json, '192.168.20.42', '$LAN_IP') WHERE config_json LIKE '%192.168.20.42%';" 2>/dev/null
          echo "  [PASS] changeIp SQL logic executed successfully"
          # Test Redis flush
          docker exec xiaozhi-esp32-server-redis redis-cli FLUSHALL && echo "  [PASS] Redis FLUSHALL OK"
          echo "  [PASS] changeIp.command validated"

      - name: Test changeIp.bat syntax
        working-directory: xiaozhi_extracted
        run: |
          echo "=== Testing changeIp.bat ==="
          # Check file exists and is non-empty
          test -s changeIp.bat && echo "  [PASS] File exists and non-empty"
          # Check encoding
          file changeIp.bat
          # Check it contains the expected commands
          grep -q "docker exec" changeIp.bat && echo "  [PASS] Contains docker exec commands"
          grep -q "FLUSHALL" changeIp.bat && echo "  [PASS] Contains Redis FLUSHALL"
          grep -q "sys_params" changeIp.bat && echo "  [PASS] Contains sys_params SQL"
          grep -q "ai_model_config" changeIp.bat && echo "  [PASS] Contains ai_model_config SQL"
          grep -q "docker compose" changeIp.bat && echo "  [PASS] Contains docker compose restart"
          echo "  [PASS] changeIp.bat structure validated"

      - name: Test XiaozhiDiagnostic core functions
        working-directory: xiaozhi_extracted
        run: |
          echo "=== Testing XiaozhiDiagnostic core functions ==="
          pip install pyyaml

          # Create a headless test script that tests all non-GUI logic
          cat > /tmp/test_diagnostic.py << 'PYTEST'
          import subprocess, re, socket, os, sys, time

          SCRIPT_DIR = os.getcwd()
          WS_PORT = 8000
          WEB_PORT = 8002
          VISION_PORT = 8003
          DB_CONTAINER = "xiaozhi-esp32-server-db"
          DB_USER = "root"
          DB_PASS = "123456"
          DB_NAME = "xiaozhi_esp32_server"
          CONTAINERS = [
              "xiaozhi-esp32-server",
              "xiaozhi-esp32-server-web",
              "xiaozhi-esp32-server-db",
              "xiaozhi-esp32-server-redis",
          ]

          errors = []
          passes = []

          def run_cmd(cmd, timeout=30):
              try:
                  r = subprocess.run(cmd, shell=True, capture_output=True,
                                     timeout=timeout, encoding="utf-8", errors="replace")
                  return r.returncode, (r.stdout or "") + (r.stderr or "")
              except:
                  return -1, ""

          def port_listening(port):
              try:
                  s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  s.settimeout(2)
                  result = s.connect_ex(("127.0.0.1", port))
                  s.close()
                  return result == 0
              except:
                  return False

          def http_get(url, timeout=5):
              import urllib.request
              try:
                  resp = urllib.request.urlopen(url, timeout=timeout)
                  return resp.status, resp.read().decode("utf-8", errors="replace")
              except Exception as e:
                  return getattr(e, "code", None), str(e)

          # Test 1: Docker check
          print("--- Test 1: Docker running ---")
          rc, _ = run_cmd("docker info")
          if rc == 0:
              passes.append("Docker is running")
              print("  [PASS] Docker is running")
          else:
              errors.append("Docker not running")
              print("  [FAIL] Docker not running")

          # Test 2: Container check
          print("--- Test 2: Containers running ---")
          rc, out = run_cmd("docker ps --format '{{.Names}}'")
          running = [x.strip().strip("'") for x in out.split("\n") if x.strip()]
          for c in CONTAINERS:
              if c in running:
                  passes.append(f"Container {c} running")
                  print(f"  [PASS] {c} running")
              else:
                  errors.append(f"Container {c} not running")
                  print(f"  [FAIL] {c} NOT running")

          # Test 3: Port check
          print("--- Test 3: Ports listening ---")
          for port, desc in [(WS_PORT,"WebSocket"),(WEB_PORT,"Web"),(VISION_PORT,"Vision")]:
              if port_listening(port):
                  passes.append(f"Port {port} ({desc}) listening")
                  print(f"  [PASS] Port {port} ({desc}) listening")
              else:
                  errors.append(f"Port {port} ({desc}) not listening")
                  print(f"  [FAIL] Port {port} ({desc}) NOT listening")
          PYTEST

          cat >> /tmp/test_diagnostic.py << 'PYTEST2'

          # Test 4: LAN IP detection
          print("--- Test 4: LAN IP detection ---")
          rc, out = run_cmd("ip addr 2>/dev/null || ifconfig 2>/dev/null")
          ips = []
          for m in re.finditer(r"inet\s+(\d+\.\d+\.\d+\.\d+)", out):
              ip = m.group(1)
              if not ip.startswith("127."):
                  ips.append(ip)
          if ips:
              passes.append(f"LAN IPs detected: {ips}")
              print(f"  [PASS] LAN IPs: {ips}")
          else:
              errors.append("No LAN IP detected")
              print("  [FAIL] No LAN IP")

          # Test 5: OTA endpoint
          print("--- Test 5: OTA endpoint ---")
          code, body = http_get(f"http://127.0.0.1:{WEB_PORT}/xiaozhi/ota/")
          if code and code in (200, 404, 302, 401):
              passes.append(f"OTA endpoint reachable (HTTP {code})")
              print(f"  [PASS] OTA endpoint reachable (HTTP {code})")
          else:
              # Web service might not be fully up, warn but don't fail
              print(f"  [WARN] OTA endpoint: code={code}")

          # Test 6: DB connection
          print("--- Test 6: Database connection ---")
          rc, out = run_cmd(f'docker exec {DB_CONTAINER} mysql -u{DB_USER} -p{DB_PASS} {DB_NAME} -N -e "SELECT 1;"')
          if "1" in out:
              passes.append("DB connection OK")
              print("  [PASS] DB connection OK")
          else:
              errors.append("DB connection failed")
              print(f"  [FAIL] DB connection: {out[:100]}")

          # Test 7: DB query (sys_params table exists)
          print("--- Test 7: sys_params table ---")
          rc, out = run_cmd(f'docker exec {DB_CONTAINER} mysql -u{DB_USER} -p{DB_PASS} {DB_NAME} -N -e "SHOW TABLES LIKE \'sys_params\';"')
          if "sys_params" in out:
              passes.append("sys_params table exists")
              print("  [PASS] sys_params table exists")
          else:
              print("  [WARN] sys_params table not found (may need initialization)")

          # Test 8: Redis connection
          print("--- Test 8: Redis connection ---")
          rc, out = run_cmd("docker exec xiaozhi-esp32-server-redis redis-cli PING")
          if "PONG" in out:
              passes.append("Redis PING OK")
              print("  [PASS] Redis PING -> PONG")
          else:
              errors.append("Redis not responding")
              print(f"  [FAIL] Redis: {out[:50]}")

          # Test 9: Docker logs accessible
          print("--- Test 9: Docker logs ---")
          rc, out = run_cmd("docker logs --tail 10 xiaozhi-esp32-server")
          if rc == 0:
              passes.append("Docker logs accessible")
              print(f"  [PASS] Docker logs accessible ({len(out)} chars)")
          else:
              errors.append("Docker logs not accessible")
              print("  [FAIL] Cannot read docker logs")

          # Summary
          print("")
          print(f"=== RESULTS: {len(passes)} passed, {len(errors)} failed ===")
          if errors:
              print("FAILURES:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          else:
              print("All diagnostic functions validated!")
          PYTEST2

          python3 /tmp/test_diagnostic.py

      - name: Cleanup
        if: always()
        working-directory: xiaozhi_extracted
        run: |
          docker compose -f docker-compose_all.yml down -v 2>/dev/null || true

  test-macos:
    name: Test on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and extract xiaozhi_v18.zip
        run: |
          curl -L --retry 3 --retry-delay 5 -o xiaozhi_v18.zip "https://creator.integem.com/wp-content/soft/xiaozhi_v18.zip"
          unzip -o xiaozhi_v18.zip -d xiaozhi_extracted
          echo "=== Files extracted ==="
          find xiaozhi_extracted -maxdepth 1 -type f | sort

      - name: Install Docker (colima)
        run: |
          echo "=== Installing Docker on macOS via colima ==="
          brew install docker docker-compose colima
          colima start --cpu 2 --memory 4 --disk 20
          echo "Waiting for Docker to be ready..."
          for i in $(seq 1 30); do
            if docker info >/dev/null 2>&1; then
              echo "  Docker is ready!"
              break
            fi
            sleep 2
          done
          docker --version
          docker compose version

      - name: Start Docker Compose services
        working-directory: xiaozhi_extracted
        run: |
          echo "=== Starting Docker Compose services ==="
          docker compose -f docker-compose_all.yml up -d
          echo "Waiting 45s for services to be ready..."
          sleep 45
          echo "=== Container status ==="
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Verify containers are running
        run: |
          echo "=== Verifying containers ==="
          EXPECTED="xiaozhi-esp32-server xiaozhi-esp32-server-web xiaozhi-esp32-server-db xiaozhi-esp32-server-redis"
          ALL_OK=true
          for c in $EXPECTED; do
            STATUS=$(docker inspect --format='{{.State.Status}}' "$c" 2>/dev/null || echo "not_found")
            if [ "$STATUS" = "running" ]; then
              echo "  [PASS] $c is running"
            else
              echo "  [WARN] $c status: $STATUS"
              ALL_OK=false
            fi
          done
          if [ "$ALL_OK" = "false" ]; then
            echo "Some containers not ready, showing logs..."
            docker compose -f xiaozhi_extracted/docker-compose_all.yml logs --tail=30
          fi

      - name: Test changeIp.command (macOS native)
        working-directory: xiaozhi_extracted
        run: |
          echo "=== Testing changeIp.command on macOS ==="
          # Syntax check
          bash -n changeIp.command && echo "  [PASS] Syntax OK"
          # Check shebang
          head -1 changeIp.command | grep -q "^#!/bin/bash" && echo "  [PASS] Shebang OK"
          # Check no CRLF
          CR_COUNT=$(tr -cd '\r' < changeIp.command | wc -c | tr -d ' ')
          if [ "$CR_COUNT" -eq "0" ]; then
            echo "  [PASS] No CRLF (macOS compatible)"
          else
            echo "  [FAIL] Has CRLF line endings"
            exit 1
          fi
          # Test IP detection (ifconfig on macOS)
          echo "  Testing IP detection..."
          LAN_IP=$(ifconfig 2>/dev/null | grep "inet " | grep -v "127.0.0.1" | awk '{print $2}' | head -1)
          echo "  Detected LAN IP: $LAN_IP"
          # Test DB operations via docker
          echo "192.168.20.42" > .last_ip
          docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -e "SELECT 1;" 2>/dev/null && echo "  [PASS] DB accessible from changeIp context"
          docker exec xiaozhi-esp32-server-redis redis-cli FLUSHALL && echo "  [PASS] Redis FLUSHALL OK"
          echo "  [PASS] changeIp.command validated on macOS"

      - name: Test startDiagnostic.command
        working-directory: xiaozhi_extracted
        run: |
          echo "=== Testing startDiagnostic.command ==="
          bash -n startDiagnostic.command && echo "  [PASS] Syntax OK"
          head -1 startDiagnostic.command | grep -q "^#!" && echo "  [PASS] Has shebang"
          CR_COUNT=$(tr -cd '\r' < startDiagnostic.command | wc -c | tr -d ' ')
          [ "$CR_COUNT" -eq "0" ] && echo "  [PASS] No CRLF" || echo "  [WARN] Has CRLF"
          echo "  [PASS] startDiagnostic.command validated"

      - name: Test XiaozhiDiagnostic-macOS binary
        working-directory: xiaozhi_extracted
        run: |
          echo "=== Testing XiaozhiDiagnostic-macOS ==="
          # Check file exists and is executable binary
          test -f XiaozhiDiagnostic-macOS && echo "  [PASS] Binary exists"
          chmod +x XiaozhiDiagnostic-macOS
          file XiaozhiDiagnostic-macOS
          # Check it's a valid Mach-O executable
          if file XiaozhiDiagnostic-macOS | grep -q "Mach-O"; then
            echo "  [PASS] Valid Mach-O binary"
          else
            echo "  [WARN] Not a Mach-O binary (may be Linux format)"
          fi
          # Try to run with --help or just check it starts (will fail due to no display, but validates binary loads)
          timeout 5 ./XiaozhiDiagnostic-macOS --help 2>&1 || true
          echo "  [PASS] Binary checked"

      - name: Test XiaozhiDiagnostic core logic (headless)
        working-directory: xiaozhi_extracted
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install pyyaml

          cat > /tmp/test_diag_mac.py << 'PYTEST'
          import subprocess, re, socket, os, sys

          WS_PORT = 8000
          WEB_PORT = 8002
          VISION_PORT = 8003
          DB_CONTAINER = "xiaozhi-esp32-server-db"
          CONTAINERS = ["xiaozhi-esp32-server","xiaozhi-esp32-server-web","xiaozhi-esp32-server-db","xiaozhi-esp32-server-redis"]
          passes = []
          errors = []

          def run_cmd(cmd, timeout=30):
              try:
                  r = subprocess.run(cmd, shell=True, capture_output=True, timeout=timeout, encoding="utf-8", errors="replace")
                  return r.returncode, (r.stdout or "") + (r.stderr or "")
              except:
                  return -1, ""

          def port_listening(port):
              try:
                  s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  s.settimeout(2)
                  result = s.connect_ex(("127.0.0.1", port))
                  s.close()
                  return result == 0
              except:
                  return False

          # Test Docker
          print("--- Docker ---")
          rc, _ = run_cmd("docker info")
          if rc == 0:
              passes.append("Docker OK")
              print("  [PASS] Docker running")
          else:
              errors.append("Docker not running")
              print("  [FAIL] Docker not running")

          # Test Containers
          print("--- Containers ---")
          rc, out = run_cmd("docker ps --format '{{.Names}}'")
          running = [x.strip().strip("'") for x in out.split("\n") if x.strip()]
          for c in CONTAINERS:
              if c in running:
                  passes.append(f"{c} running")
                  print(f"  [PASS] {c}")
              else:
                  errors.append(f"{c} not running")
                  print(f"  [FAIL] {c}")

          # Test Ports
          print("--- Ports ---")
          for p in [WS_PORT, WEB_PORT, VISION_PORT]:
              if port_listening(p):
                  passes.append(f"Port {p} OK")
                  print(f"  [PASS] Port {p}")
              else:
                  errors.append(f"Port {p} not listening")
                  print(f"  [FAIL] Port {p}")

          # Test LAN IP detection
          print("--- LAN IP ---")
          rc, out = run_cmd("ifconfig 2>/dev/null")
          ips = [m.group(1) for m in re.finditer(r"inet (\d+\.\d+\.\d+\.\d+)", out) if not m.group(1).startswith("127.")]
          if ips:
              passes.append(f"LAN IPs: {ips}")
              print(f"  [PASS] IPs: {ips}")
          else:
              errors.append("No LAN IP")
              print("  [FAIL] No LAN IP")

          # Test Redis
          print("--- Redis ---")
          rc, out = run_cmd("docker exec xiaozhi-esp32-server-redis redis-cli PING")
          if "PONG" in out:
              passes.append("Redis OK")
              print("  [PASS] Redis PONG")
          else:
              errors.append("Redis failed")
              print(f"  [FAIL] Redis: {out[:50]}")

          # Test DB
          print("--- Database ---")
          rc, out = run_cmd(f'docker exec {DB_CONTAINER} mysql -uroot -p123456 xiaozhi_esp32_server -N -e "SELECT 1;"')
          if "1" in out:
              passes.append("DB OK")
              print("  [PASS] DB connection")
          else:
              errors.append("DB failed")
              print(f"  [FAIL] DB: {out[:80]}")

          print(f"\n=== {len(passes)} passed, {len(errors)} failed ===")
          if errors:
              for e in errors: print(f"  - {e}")
              sys.exit(1)
          PYTEST

          python3 /tmp/test_diag_mac.py

      - name: Cleanup
        if: always()
        working-directory: xiaozhi_extracted
        run: |
          docker compose -f docker-compose_all.yml down -v 2>/dev/null || true
          colima stop 2>/dev/null || true

  test-windows:
    name: Test on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and extract xiaozhi_v18.zip
        run: |
          Write-Host "=== Downloading xiaozhi_v18.zip ==="
          $maxRetries = 3
          $retryCount = 0
          $success = $false
          while (-not $success -and $retryCount -lt $maxRetries) {
              try {
                  $retryCount++
                  Write-Host "Attempt $retryCount..."
                  $ProgressPreference = 'SilentlyContinue'
                  Invoke-WebRequest -Uri "https://creator.integem.com/wp-content/soft/xiaozhi_v18.zip" -OutFile "xiaozhi_v18.zip" -TimeoutSec 300
                  $success = $true
              } catch {
                  Write-Host "  Failed: $_"
                  if ($retryCount -lt $maxRetries) { Start-Sleep -Seconds 10 }
              }
          }
          if (-not $success) {
              curl.exe -L --retry 3 --retry-delay 5 -o "xiaozhi_v18.zip" "https://creator.integem.com/wp-content/soft/xiaozhi_v18.zip"
          }
          Expand-Archive -Path "xiaozhi_v18.zip" -DestinationPath "xiaozhi_extracted" -Force
          Get-ChildItem "xiaozhi_extracted" -File | Select-Object Name

      - name: Setup Docker
        run: |
          Write-Host "=== Docker should be pre-installed on Windows runner ==="
          docker --version
          docker compose version

      - name: Start Docker Compose services
        working-directory: xiaozhi_extracted
        run: |
          Write-Host "=== Starting Docker Compose services ==="
          docker compose -f docker-compose_all.yml up -d
          Write-Host "Waiting 45s for services to be ready..."
          Start-Sleep -Seconds 45
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Verify containers are running
        run: |
          $expected = @("xiaozhi-esp32-server","xiaozhi-esp32-server-web","xiaozhi-esp32-server-db","xiaozhi-esp32-server-redis")
          $allOk = $true
          foreach ($c in $expected) {
              $status = docker inspect --format='{{.State.Status}}' $c 2>$null
              if ($status -eq "running") {
                  Write-Host "  [PASS] $c is running"
              } else {
                  Write-Host "  [WARN] $c status: $status"
                  $allOk = $false
              }
          }
          if (-not $allOk) {
              docker compose -f xiaozhi_extracted/docker-compose_all.yml logs --tail=30
          }

      - name: Test changeIp.bat
        working-directory: xiaozhi_extracted
        run: |
          Write-Host "=== Testing changeIp.bat ==="
          # Verify file structure
          $content = Get-Content changeIp.bat -Raw
          if ($content -match 'docker exec') { Write-Host "  [PASS] Contains docker exec" }
          if ($content -match 'FLUSHALL') { Write-Host "  [PASS] Contains Redis FLUSHALL" }
          if ($content -match 'sys_params') { Write-Host "  [PASS] Contains sys_params SQL" }
          if ($content -match 'ai_model_config') { Write-Host "  [PASS] Contains ai_model_config SQL" }
          if ($content -match 'docker compose') { Write-Host "  [PASS] Contains docker compose restart" }
          if ($content -match '@echo off') { Write-Host "  [PASS] Starts with @echo off" }
          # Test the DB connection used by changeIp
          docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -e "SELECT 1;" 2>$null
          if ($LASTEXITCODE -eq 0) { Write-Host "  [PASS] DB connection OK" }
          # Test Redis used by changeIp
          $ping = docker exec xiaozhi-esp32-server-redis redis-cli PING
          if ($ping -match "PONG") { Write-Host "  [PASS] Redis PING OK" }
          # Test SQL logic (non-interactive)
          "192.168.20.42" | Out-File -Encoding ascii .last_ip
          $LAN_IP = (Get-NetIPAddress -AddressFamily IPv4 | Where-Object { $_.IPAddress -notmatch '^127\.' -and $_.IPAddress -notmatch '^169\.' } | Select-Object -First 1).IPAddress
          Write-Host "  LAN IP: $LAN_IP"
          docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -e "UPDATE sys_params SET param_value = REPLACE(param_value, '192.168.20.42', '$LAN_IP') WHERE param_value LIKE '%192.168.20.42%';" 2>$null
          docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -e "UPDATE ai_model_config SET config_json = REPLACE(config_json, '192.168.20.42', '$LAN_IP') WHERE config_json LIKE '%192.168.20.42%';" 2>$null
          docker exec xiaozhi-esp32-server-redis redis-cli FLUSHALL
          Write-Host "  [PASS] changeIp.bat logic validated"

      - name: Test XiaozhiDiagnostic.exe
        working-directory: xiaozhi_extracted
        run: |
          Write-Host "=== Testing XiaozhiDiagnostic.exe ==="
          # Check file exists
          if (Test-Path "XiaozhiDiagnostic.exe") { Write-Host "  [PASS] Binary exists" }
          $fileInfo = Get-Item "XiaozhiDiagnostic.exe"
          Write-Host "  Size: $($fileInfo.Length) bytes"
          # Check it's a valid PE executable
          $bytes = [System.IO.File]::ReadAllBytes("$PWD\XiaozhiDiagnostic.exe")
          if ($bytes[0] -eq 0x4D -and $bytes[1] -eq 0x5A) {
              Write-Host "  [PASS] Valid PE (MZ header)"
          } else {
              Write-Host "  [FAIL] Not a valid PE file"
              exit 1
          }

      - name: Test XiaozhiDiagnostic core logic (headless)
        working-directory: xiaozhi_extracted
        run: |
          Write-Host "=== Testing Diagnostic functions ==="
          $errors = @()
          $passes = @()

          # Test 1: Docker
          docker info 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
              $passes += "Docker running"
              Write-Host "  [PASS] Docker running"
          } else {
              $errors += "Docker not running"
              Write-Host "  [FAIL] Docker"
          }

          # Test 2: Containers
          $running = docker ps --format '{{.Names}}' 2>$null
          $expected = @("xiaozhi-esp32-server","xiaozhi-esp32-server-web","xiaozhi-esp32-server-db","xiaozhi-esp32-server-redis")
          foreach ($c in $expected) {
              if ($running -match $c) {
                  $passes += "$c running"
                  Write-Host "  [PASS] $c"
              } else {
                  $errors += "$c not running"
                  Write-Host "  [FAIL] $c"
              }
          }

          # Test 3: Ports
          foreach ($port in @(8000, 8002, 8003)) {
              $tcp = New-Object System.Net.Sockets.TcpClient
              try {
                  $tcp.Connect("127.0.0.1", $port)
                  $passes += "Port $port OK"
                  Write-Host "  [PASS] Port $port listening"
                  $tcp.Close()
              } catch {
                  $errors += "Port $port not listening"
                  Write-Host "  [FAIL] Port $port"
              }
          }

          # Test 4: LAN IP
          $ip = (Get-NetIPAddress -AddressFamily IPv4 | Where-Object { $_.IPAddress -notmatch '^127\.' -and $_.IPAddress -notmatch '^169\.' } | Select-Object -First 1).IPAddress
          if ($ip) {
              $passes += "LAN IP: $ip"
              Write-Host "  [PASS] LAN IP: $ip"
          } else {
              $errors += "No LAN IP"
              Write-Host "  [FAIL] No LAN IP"
          }

          # Test 5: Redis
          $ping = docker exec xiaozhi-esp32-server-redis redis-cli PING
          if ($ping -match "PONG") {
              $passes += "Redis OK"
              Write-Host "  [PASS] Redis PONG"
          } else {
              $errors += "Redis failed"
              Write-Host "  [FAIL] Redis"
          }

          # Test 6: DB
          $db = docker exec xiaozhi-esp32-server-db mysql -uroot -p123456 xiaozhi_esp32_server -N -e "SELECT 1;" 2>$null
          if ($db -match "1") {
              $passes += "DB OK"
              Write-Host "  [PASS] DB connection"
          } else {
              $errors += "DB failed"
              Write-Host "  [FAIL] DB"
          }

          # Test 7: Docker logs
          $logs = docker logs --tail 5 xiaozhi-esp32-server 2>&1
          if ($LASTEXITCODE -eq 0) {
              $passes += "Docker logs OK"
              Write-Host "  [PASS] Docker logs accessible"
          } else {
              $errors += "Docker logs failed"
              Write-Host "  [FAIL] Docker logs"
          }

          Write-Host ""
          Write-Host "=== $($passes.Count) passed, $($errors.Count) failed ==="
          if ($errors.Count -gt 0) {
              foreach ($e in $errors) { Write-Host "  - $e" }
              exit 1
          }

      - name: Cleanup
        if: always()
        working-directory: xiaozhi_extracted
        run: |
          docker compose -f docker-compose_all.yml down -v 2>$null
